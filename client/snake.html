<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Snake con Chat WebSocket</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 30px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .game-area {
      text-align: center;
    }

    canvas {
      background: #00aa00;
      border: 4px solid white;
    }

    .chat-area {
      width: 320px;
      background: #222;
      border: 3px solid #444;
      border-radius: 10px;
      padding: 15px;
      text-align: left;
    }

    .chat-area h2 {
      text-align: center;
      margin-top: 0;
    }

    #status {
      text-align: center;
      font-size: 14px;
      margin-bottom: 10px;
      color: orange;
    }

    #messages {
      height: 280px;
      overflow-y: auto;
      background: #111;
      border: 1px solid #555;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .message {
      margin-bottom: 8px;
      padding: 6px;
      background: #333;
      border-radius: 6px;
      word-wrap: break-word;
    }

    .system {
      color: #00ff99;
      font-style: italic;
    }

    .input-row {
      display: flex;
      gap: 5px;
    }

    #messageInput {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 5px;
    }

    #sendBtn {
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background: #2e75b6;
      color: white;
      cursor: pointer;
    }

    #sendBtn:hover {
      background: #1f4e79;
    }

    .instructions {
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <h1>Snake con Chat WebSocket</h1>

  <div class="container">

    <div class="game-area">
      <p>Puntaje: <span id="score">0</span></p>
      <canvas id="game" width="400" height="400"></canvas>
      <p class="instructions">Usa las flechas ↑ ↓ ← → para jugar</p>
    </div>

    <div class="chat-area">
      <h2>Chat del juego</h2>
      <div id="status">Conectando...</div>

      <div id="messages"></div>

      <div class="input-row">
        <input type="text" id="messageInput" placeholder="Escribe un mensaje...">
        <button id="sendBtn">Enviar</button>
      </div>
    </div>

  </div>

  <script>
    // ==========================
    // JUEGO SNAKE
    // ==========================

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("score");

    const box = 20;
    let score = 0;

    let snake = [
      { x: 200, y: 200 }
    ];

    let food = {
      x: Math.floor(Math.random() * 20) * box,
      y: Math.floor(Math.random() * 20) * box
    };

    let direction = "RIGHT";
    let nextDirection = "RIGHT";

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowUp" && direction !== "DOWN") {
        nextDirection = "UP";
      } else if (event.key === "ArrowDown" && direction !== "UP") {
        nextDirection = "DOWN";
      } else if (event.key === "ArrowLeft" && direction !== "RIGHT") {
        nextDirection = "LEFT";
      } else if (event.key === "ArrowRight" && direction !== "LEFT") {
        nextDirection = "RIGHT";
      }
    });

    function drawGame() {
      direction = nextDirection;

      ctx.fillStyle = "#00aa00";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < snake.length; i++) {
        ctx.fillStyle = i === 0 ? "#0033ff" : "#00ffff";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);

        ctx.strokeStyle = "#111";
        ctx.strokeRect(snake[i].x, snake[i].y, box, box);
      }

      ctx.fillStyle = "red";
      ctx.fillRect(food.x, food.y, box, box);

      let headX = snake[0].x;
      let headY = snake[0].y;

      if (direction === "UP") headY -= box;
      if (direction === "DOWN") headY += box;
      if (direction === "LEFT") headX -= box;
      if (direction === "RIGHT") headX += box;

      if (
        headX < 0 ||
        headY < 0 ||
        headX >= canvas.width ||
        headY >= canvas.height ||
        collision(headX, headY, snake)
      ) {
        clearInterval(game);
        alert("Perdiste. Puntaje: " + score);
        location.reload();
        return;
      }

      let newHead = {
        x: headX,
        y: headY
      };

      if (headX === food.x && headY === food.y) {
        score++;
        scoreText.textContent = score;

        food = {
          x: Math.floor(Math.random() * 20) * box,
          y: Math.floor(Math.random() * 20) * box
        };
      } else {
        snake.pop();
      }

      snake.unshift(newHead);
    }

    function collision(x, y, array) {
      for (let i = 0; i < array.length; i++) {
        if (x === array[i].x && y === array[i].y) {
          return true;
        }
      }
      return false;
    }

    const game = setInterval(drawGame, 150);

    // ==========================
    // CHAT WEBSOCKET
    // ==========================

    const statusDiv = document.getElementById("status");
    const messagesDiv = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    const playerName = "Jugador-" + Math.floor(Math.random() * 1000);

    const socketUrl = "wss://websocket-snake-server-guambi971-dev.apps.rm3.7wse.p1.openshiftapps.com";

    let socket;

    function connectChat() {
      socket = new WebSocket(socketUrl);

      socket.onopen = function() {
        statusDiv.textContent = "Conectado como " + playerName;
        statusDiv.style.color = "#00ff99";

        addMessage("Sistema", "Te conectaste al chat.", true);

        socket.send(JSON.stringify({
          type: "join",
          name: playerName,
          message: playerName + " se unió al juego"
        }));
      };

      socket.onmessage = function(event) {
        try {
          const data = JSON.parse(event.data);

          if (data.name && data.message) {
            addMessage(data.name, data.message, false);
          } else {
            addMessage("Servidor", event.data, false);
          }
        } catch (error) {
          addMessage("Servidor", event.data, false);
        }
      };

      socket.onclose = function() {
        statusDiv.textContent = "Desconectado del chat";
        statusDiv.style.color = "red";
        addMessage("Sistema", "Se perdió la conexión con el servidor.", true);
      };

      socket.onerror = function() {
        statusDiv.textContent = "Error de conexión";
        statusDiv.style.color = "red";
        addMessage("Sistema", "No se pudo conectar al WebSocket.", true);
      };
    }

    function addMessage(name, message, isSystem) {
      const div = document.createElement("div");
      div.className = "message";

      if (isSystem) {
        div.innerHTML = '<span class="system">' + message + '</span>';
      } else {
        div.innerHTML = "<strong>" + name + ":</strong> " + message;
      }

      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function sendMessage() {
      const text = messageInput.value.trim();

      if (text === "") {
        return;
      }

      if (!socket || socket.readyState !== WebSocket.OPEN) {
        addMessage("Sistema", "No estás conectado al chat.", true);
        return;
      }

      const messageData = {
        type: "chat",
        name: playerName,
        message: text
      };

      socket.send(JSON.stringify(messageData));

      messageInput.value = "";
      messageInput.focus();
    }

    sendBtn.addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    connectChat();
  </script>

</body>
</html>
